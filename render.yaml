services:
  - type: web
    name: crispro-frontend
    env: static
    # Root Directory: leave EMPTY in the Render dashboard (repo root — flat repo, no subdirectory).
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: VITE_ENABLE_MOCK_AUTH
        value: "false"
      - key: VITE_API_ROOT
        # Backend moved to Railway 2026-06-05. Old Render backend (crispro-backend-v2.onrender.com)
        # was causing CORS failures because it was no longer the live backend.
        # NOTE: sync: false — Render dashboard value takes precedence over this file.
        # You MUST also update the dashboard manually: VITE_API_ROOT → value below.
        value: "https://crispro-backend-v2-production.up.railway.app"
        sync: false
