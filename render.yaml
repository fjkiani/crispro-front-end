services:
  - type: web
    name: crispro-frontend
    env: static
    # Root Directory: leave EMPTY in the Render dashboard (repo root — flat repo, no subdirectory).
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: VITE_ENABLE_MOCK_AUTH
        value: "false"
      - key: VITE_API_ROOT
        # Set this to your actual backend Render URL in the Render dashboard.
        # Example: https://oncology-backend.onrender.com
        value: "https://oncology-backend.onrender.com"
        sync: false
